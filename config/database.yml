default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "password") %>
  host: <%= ENV.fetch("POSTGRES_HOST", "db") %>

development:
  <<: *default
  database: rv_marketplace_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: rv_marketplace_test

production:
  primary:
    <<: *default
    database: rv_marketplace_production
  cache:
    <<: *default
    database: rv_marketplace_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: rv_marketplace_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: rv_marketplace_production_cable
    migrations_paths: db/cable_migrate
